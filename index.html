<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style/style.css">
  <title>Program Selector</title>
</head>
<body>
  <!-- Department Title with Logo -->
  <header>
    <img src="img/SEAL OF LOAY.png" alt="Municipal Logo">
    <img src="img/SEAL OF MSWDO.png" alt="Department Logo">
    <h1>MUNICIPAL SOCIAL WELFARE AND DEVELOPMENT OFFICE - LOAY</h1>
  </header>

  <!-- Program Options -->
  <div class="container">
   <!-- OSCA Option -->
<div class="card" onclick="chooseProgram('senior')">
  <img src="img/OSCA LOGO.png" alt="OSCA Logo">
  <h2>OSCA</h2>
</div>

<!-- Solo Parent Option -->
<div class="card" onclick="chooseProgram('sp')">
  <img src="img/SOLO PARENT LOGO.png" alt="Solo Parent Logo">
  <h2>Solo Parent</h2>
</div>

<script>
  function chooseProgram(program) {
    // Mark chosen program
    sessionStorage.setItem("programChosen", program);

    if (program === "senior") {
      window.location.href = "osca/loginsenior.html";
    } else if (program === "sp") {
      window.location.href = "soloparent/loginsp.html";
    }
  }
</script>
